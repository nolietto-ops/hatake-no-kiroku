<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>はたけのきろく</title>
  <style>
    :root {
      color-scheme: light;
      --soil: #8a5b38;
      --soil-dark: #5c3a24;
      --soil-soft: #b88458;
      --paper: #fff8ea;
      --leaf: #4e7b3f;
      --leaf-dark: #365b2b;
      --text: #2b2118;
      --muted: #70563f;
      --shadow: rgba(42, 26, 14, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 248, 226, 0.18), transparent 28rem),
        linear-gradient(155deg, #6b4329 0%, var(--soil) 46%, #9a6944 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px 34px;
    }

    header {
      color: #fff8ea;
      margin-bottom: 18px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 11vw, 3.3rem);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(255, 248, 234, 0.86);
      font-size: 0.95rem;
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      box-shadow: 0 18px 42px var(--shadow);
      padding: 18px;
    }

    .calendar {
      margin-bottom: 18px;
    }

    .calendar-header {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .calendar-header strong {
      color: var(--soil-dark);
      font-size: 1.05rem;
      text-align: center;
    }

    .calendar-header button {
      min-height: 40px;
      background: #ead7b8;
      color: var(--soil-dark);
      font-size: 0.9rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .calendar-day,
    .calendar-weekday {
      min-height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-weight: 700;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .calendar-day {
      border: 1px solid #d7b98d;
      background: #fffdf7;
      color: var(--text);
      font-size: 0.95rem;
    }

    .calendar-day.has-record {
      background: #e4efd8;
      border-color: var(--leaf);
      color: var(--leaf-dark);
    }

    .calendar-day.selected {
      background: var(--leaf);
      color: #fff;
    }

    .calendar-day:disabled {
      opacity: 0;
      pointer-events: none;
    }

    label {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.92rem;
    }

    input,
    textarea {
      display: block;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      border: 1px solid #d7b98d;
      border-radius: 8px;
      background: #fffdf7;
      color: var(--text);
      font: inherit;
      padding: 12px 13px;
      outline: none;
    }

    input[type="date"] {
      min-height: 56px;
      text-align: center;
      -webkit-appearance: none;
      appearance: none;
    }

    input[type="date"]::-webkit-date-and-time-value {
      margin: 0;
      text-align: center;
    }

    input[type="file"] {
      padding: 10px;
    }

    input:focus,
    textarea:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(78, 123, 63, 0.16);
    }

    textarea {
      min-height: 190px;
      resize: vertical;
    }

    .field + .field {
      margin-top: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .backup-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .save {
      flex: 1;
      background: var(--leaf);
      color: #fff;
    }

    .save:hover {
      filter: brightness(1.04);
    }

    .clear {
      width: 86px;
      background: #ead7b8;
      color: var(--soil-dark);
    }

    .backup-button {
      background: #ead7b8;
      color: var(--soil-dark);
      font-size: 0.95rem;
    }

    .restore-input {
      display: none;
    }

    .message {
      min-height: 24px;
      margin: 12px 0 0;
      color: var(--leaf-dark);
      font-weight: 700;
    }

    .records {
      margin-top: 20px;
    }

    .records h2 {
      margin: 0 0 10px;
      color: #fff8ea;
      font-size: 1.15rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.16);
    }

    .empty {
      margin: 0;
      color: rgba(255, 248, 234, 0.82);
    }

    .record-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .record {
      background: rgba(255, 248, 234, 0.94);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(42, 26, 14, 0.14);
    }

    .record time {
      display: block;
      color: var(--soil-dark);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .record p {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .photo-preview,
    .record-photos {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .photo-preview:empty,
    .record-photos:empty {
      display: none;
    }

    .photo-preview img,
    .record-photos img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #d7b98d;
      background: #fffdf7;
    }

    @media (max-width: 420px) {
      main {
        padding-inline: 14px;
      }

      .panel {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>はたけのきろく</h1>
      <p class="subtitle">今日の畑のようすを、さっと残す小さなメモ帳。</p>
    </header>

    <section class="panel" aria-label="畑の記録入力">
      <form id="record-form">
        <section class="calendar" aria-label="記録カレンダー">
          <div class="calendar-header">
            <button type="button" id="prev-month">前月</button>
            <strong id="calendar-title"></strong>
            <button type="button" id="next-month">次月</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </section>

        <div class="field">
          <label for="date">日付</label>
          <input id="date" name="date" type="date" required>
        </div>

        <div class="field">
          <label for="memo">メモ</label>
          <textarea id="memo" name="memo" placeholder="例：トマトに水やり。きゅうりの花が咲いた。"></textarea>
        </div>

        <div class="field">
          <label for="photos">写真</label>
          <input id="photos" name="photos" type="file" accept="image/*" multiple>
          <div class="photo-preview" id="photo-preview" aria-label="この日の写真"></div>
        </div>

        <div class="actions">
          <button class="save" type="submit">保存する</button>
          <button class="clear" type="button" id="clear-button">消す</button>
        </div>
        <div class="backup-actions" aria-label="バックアップと復元">
          <button class="backup-button" type="button" id="backup-button">バックアップ</button>
          <button class="backup-button" type="button" id="restore-button">復元</button>
          <input class="restore-input" id="restore-file" type="file" accept="application/json,.json">
        </div>
        <p class="message" id="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="records" aria-label="保存した記録">
      <h2>保存した記録</h2>
      <p class="empty" id="empty">まだ記録はありません。</p>
      <ul class="record-list" id="record-list"></ul>
    </section>
  </main>

  <script>
    const form = document.querySelector("#record-form");
    const dateInput = document.querySelector("#date");
    const memoInput = document.querySelector("#memo");
    const photoInput = document.querySelector("#photos");
    const photoPreview = document.querySelector("#photo-preview");
    const calendarTitle = document.querySelector("#calendar-title");
    const calendarGrid = document.querySelector("#calendar-grid");
    const prevMonthButton = document.querySelector("#prev-month");
    const nextMonthButton = document.querySelector("#next-month");
    const clearButton = document.querySelector("#clear-button");
    const backupButton = document.querySelector("#backup-button");
    const restoreButton = document.querySelector("#restore-button");
    const restoreFileInput = document.querySelector("#restore-file");
    const message = document.querySelector("#message");
    const empty = document.querySelector("#empty");
    const recordList = document.querySelector("#record-list");
    const storageKey = "hatakeData";
    const legacyStorageKey = "hatake-no-kiroku";
    const oldStorageKey = "hatake-no-kiroku-records";

    const today = new Date();
    const localToday = new Date(today.getTime() - today.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 10);
    dateInput.value = localToday;
    let calendarDate = new Date(`${localToday}T00:00:00`);

    function createEmptyStore() {
      return {
        version: 1,
        days: {}
      };
    }

    function loadStore() {
      try {
        const savedStore = JSON.parse(localStorage.getItem(storageKey));
        if (savedStore && savedStore.version === 1 && savedStore.days) {
          return savedStore;
        }
      } catch {
        return createEmptyStore();
      }

      try {
        const legacyStore = JSON.parse(localStorage.getItem(legacyStorageKey));
        if (legacyStore && legacyStore.version === 1 && legacyStore.days) {
          saveStore(legacyStore);
          return legacyStore;
        }
      } catch {
        return createEmptyStore();
      }

      return migrateOldRecords();
    }

    function saveStore(store) {
      localStorage.setItem(storageKey, JSON.stringify(store));
    }

    function isValidStore(store) {
      return Boolean(
        store &&
        store.version === 1 &&
        store.days &&
        typeof store.days === "object" &&
        !Array.isArray(store.days)
      );
    }

    function migrateOldRecords() {
      const store = createEmptyStore();

      try {
        const oldRecords = JSON.parse(localStorage.getItem(oldStorageKey)) || [];
        oldRecords.forEach((record) => {
          if (!record.date || !record.memo) return;
          store.days[record.date] = {
            date: record.date,
            memo: record.memo,
            photos: [],
            updatedAt: record.createdAt || new Date().toISOString()
          };
        });
      } catch {
        return store;
      }

      if (Object.keys(store.days).length > 0) {
        saveStore(store);
      }

      return store;
    }

    function formatDate(value) {
      const [year, month, day] = value.split("-");
      return `${year}年${Number(month)}月${Number(day)}日`;
    }

    function toDateKey(date) {
      const localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return localDate.toISOString().slice(0, 10);
    }

    function renderCalendar() {
      const store = loadStore();
      const year = calendarDate.getFullYear();
      const month = calendarDate.getMonth();

      calendarTitle.textContent = `${year}年${month + 1}月`;
      calendarGrid.innerHTML = "";

      ["日", "月", "火", "水", "木", "金", "土"].forEach((weekday) => {
        const label = document.createElement("div");
        label.className = "calendar-weekday";
        label.textContent = weekday;
        calendarGrid.append(label);
      });

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);

      for (let index = 0; index < firstDay.getDay(); index += 1) {
        const blank = document.createElement("button");
        blank.type = "button";
        blank.className = "calendar-day";
        blank.disabled = true;
        calendarGrid.append(blank);
      }

      for (let day = 1; day <= lastDay.getDate(); day += 1) {
        const current = new Date(year, month, day);
        const dateKey = toDateKey(current);
        const button = document.createElement("button");

        button.type = "button";
        button.className = "calendar-day";
        button.textContent = day;

        if (store.days[dateKey]) {
          button.classList.add("has-record");
        }

        if (dateInput.value === dateKey) {
          button.classList.add("selected");
        }

        button.addEventListener("click", () => {
          dateInput.value = dateKey;
          loadSelectedDateMemo();
          renderCalendar();
        });

        calendarGrid.append(button);
      }
    }

    function renderRecords() {
      const store = loadStore();
      const records = Object.values(store.days)
        .sort((a, b) => b.date.localeCompare(a.date));

      recordList.innerHTML = "";
      empty.hidden = records.length > 0;

      records.forEach((record) => {
        const item = document.createElement("li");
        item.className = "record";

        const time = document.createElement("time");
        time.dateTime = record.date;
        time.textContent = formatDate(record.date);

        const text = document.createElement("p");
        text.textContent = record.memo;

        const photos = document.createElement("div");
        photos.className = "record-photos";

        (record.photos || []).forEach((photo) => {
          const image = document.createElement("img");
          image.src = photo.dataUrl;
          image.alt = photo.name || "畑の写真";
          photos.append(image);
        });

        item.append(time, text, photos);
        recordList.append(item);
      });
    }

    function renderPhotoPreview(photos) {
      photoPreview.innerHTML = "";

      photos.forEach((photo) => {
        const image = document.createElement("img");
        image.src = photo.dataUrl;
        image.alt = photo.name || "畑の写真";
        photoPreview.append(image);
      });
    }

    function loadSelectedDateMemo() {
      const store = loadStore();
      const record = store.days[dateInput.value];
      memoInput.value = record ? record.memo : "";
      photoInput.value = "";
      renderPhotoPreview(record?.photos || []);
      message.textContent = record ? "この日の記録を読み込みました。" : "";
    }

    function loadImage(dataUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = dataUrl;
      });
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function resizePhoto(file) {
      const dataUrl = await readFileAsDataUrl(file);
      const image = await loadImage(dataUrl);
      const maxSize = 1200;
      const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(image.width * scale);
      canvas.height = Math.round(image.height * scale);

      const context = canvas.getContext("2d");
      context.drawImage(image, 0, 0, canvas.width, canvas.height);

      return {
        id: `photo_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        name: file.name,
        type: "image/jpeg",
        dataUrl: canvas.toDataURL("image/jpeg", 0.72),
        createdAt: new Date().toISOString()
      };
    }

    async function createPhotosFromInput() {
      const files = Array.from(photoInput.files || []);
      const photos = [];

      for (const file of files) {
        if (file.type.startsWith("image/")) {
          photos.push(await resizePhoto(file));
        }
      }

      return photos;
    }

    function downloadBackup() {
      const store = loadStore();
      const json = JSON.stringify(store, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = `hatakeData-${localToday}.json`;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);

      message.textContent = "バックアップを書き出しました。";
    }

    function refreshCurrentView() {
      loadSelectedDateMemo();
      renderRecords();
      renderCalendar();
    }

    async function restoreBackup(file) {
      if (!file) return;

      try {
        const text = await file.text();
        const importedStore = JSON.parse(text);

        if (!isValidStore(importedStore)) {
          message.textContent = "復元できないJSONです。";
          return;
        }

        const ok = window.confirm("現在の記録を、選んだバックアップで置き換えます。よろしいですか？");
        if (!ok) {
          message.textContent = "復元をキャンセルしました。";
          return;
        }

        saveStore(importedStore);
        refreshCurrentView();
        message.textContent = "バックアップから復元しました。";
      } catch {
        message.textContent = "JSONファイルの読み込みに失敗しました。";
      } finally {
        restoreFileInput.value = "";
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const memo = memoInput.value.trim();
      const store = loadStore();
      const currentRecord = store.days[dateInput.value];
      const selectedPhotoCount = photoInput.files ? photoInput.files.length : 0;

      if (!memo && !currentRecord?.photos?.length && selectedPhotoCount === 0) {
        message.textContent = "メモか写真を入れてから保存してください。";
        memoInput.focus();
        return;
      }

      const saveButton = form.querySelector(".save");
      saveButton.disabled = true;
      message.textContent = "保存しています。";

      try {
        const newPhotos = await createPhotosFromInput();
        const photos = [
          ...(currentRecord?.photos || []),
          ...newPhotos
        ];

        store.days[dateInput.value] = {
          date: dateInput.value,
          memo,
          photos,
          updatedAt: new Date().toISOString()
        };
        saveStore(store);

        photoInput.value = "";
        renderPhotoPreview(photos);
        message.textContent = "保存しました。";
        renderRecords();
        renderCalendar();
      } catch {
        message.textContent = "写真の保存に失敗しました。別の写真で試してください。";
      } finally {
        saveButton.disabled = false;
      }
    });

    dateInput.addEventListener("change", () => {
      calendarDate = new Date(`${dateInput.value}T00:00:00`);
      loadSelectedDateMemo();
      renderCalendar();
    });

    prevMonthButton.addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() - 1, 1);
      renderCalendar();
    });

    nextMonthButton.addEventListener("click", () => {
      calendarDate = new Date(calendarDate.getFullYear(), calendarDate.getMonth() + 1, 1);
      renderCalendar();
    });

    backupButton.addEventListener("click", downloadBackup);

    restoreButton.addEventListener("click", () => {
      restoreFileInput.click();
    });

    restoreFileInput.addEventListener("change", () => {
      restoreBackup(restoreFileInput.files?.[0]);
    });

    clearButton.addEventListener("click", () => {
      memoInput.value = "";
      photoInput.value = "";
      message.textContent = "";
      memoInput.focus();
    });

    renderRecords();
    loadSelectedDateMemo();
    renderCalendar();
  </script>
</body>
</html>
