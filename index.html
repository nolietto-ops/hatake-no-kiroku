<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>はたけのきろく</title>
  <style>
    :root {
      color-scheme: light;
      --soil: #8a5b38;
      --soil-dark: #5c3a24;
      --soil-soft: #b88458;
      --paper: #fff8ea;
      --leaf: #4e7b3f;
      --leaf-dark: #365b2b;
      --text: #2b2118;
      --muted: #70563f;
      --shadow: rgba(42, 26, 14, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 248, 226, 0.18), transparent 28rem),
        linear-gradient(155deg, #6b4329 0%, var(--soil) 46%, #9a6944 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 560px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px 34px;
    }

    header {
      color: #fff8ea;
      margin-bottom: 18px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.18);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 11vw, 3.3rem);
      letter-spacing: 0;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(255, 248, 234, 0.86);
      font-size: 0.95rem;
    }

    .panel {
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 8px;
      box-shadow: 0 18px 42px var(--shadow);
      padding: 18px;
    }

    label {
      display: block;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 0.92rem;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #d7b98d;
      border-radius: 8px;
      background: #fffdf7;
      color: var(--text);
      font: inherit;
      padding: 12px 13px;
      outline: none;
      box-sizing: border-box;
    }

    input:focus,
    textarea:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(78, 123, 63, 0.16);
    }

    textarea {
      min-height: 190px;
      resize: vertical;
    }

    .field + .field {
      margin-top: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .save {
      flex: 1;
      background: var(--leaf);
      color: #fff;
    }

    .save:hover {
      filter: brightness(1.04);
    }

    .clear {
      width: 86px;
      background: #ead7b8;
      color: var(--soil-dark);
    }

    .message {
      min-height: 24px;
      margin: 12px 0 0;
      color: var(--leaf-dark);
      font-weight: 700;
    }

    .records {
      margin-top: 20px;
    }

    .records h2 {
      margin: 0 0 10px;
      color: #fff8ea;
      font-size: 1.15rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.16);
    }

    .empty {
      margin: 0;
      color: rgba(255, 248, 234, 0.82);
    }

    .record-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .record {
      background: rgba(255, 248, 234, 0.94);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(42, 26, 14, 0.14);
    }

    .record time {
      display: block;
      color: var(--soil-dark);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .record p {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    @media (max-width: 420px) {
      main {
        padding-inline: 14px;
      }

      .panel {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>はたけのきろく</h1>
      <p class="subtitle">今日の畑のようすを、さっと残す小さなメモ帳。</p>
    </header>

    <section class="panel" aria-label="畑の記録入力">
      <form id="record-form">
        <div class="field">
          <label for="date">日付</label>
          <input id="date" name="date" type="date" required>
        </div>

        <div class="field">
          <label for="memo">メモ</label>
          <textarea id="memo" name="memo" placeholder="例：トマトに水やり。きゅうりの花が咲いた。" required></textarea>
        </div>

        <div class="actions">
          <button class="save" type="submit">保存する</button>
          <button class="clear" type="button" id="clear-button">消す</button>
        </div>
        <p class="message" id="message" aria-live="polite"></p>
      </form>
    </section>

    <section class="records" aria-label="保存した記録">
      <h2>保存した記録</h2>
      <p class="empty" id="empty">まだ記録はありません。</p>
      <ul class="record-list" id="record-list"></ul>
    </section>
  </main>

  <script>
    const form = document.querySelector("#record-form");
    const dateInput = document.querySelector("#date");
    const memoInput = document.querySelector("#memo");
    const clearButton = document.querySelector("#clear-button");
    const message = document.querySelector("#message");
    const empty = document.querySelector("#empty");
    const recordList = document.querySelector("#record-list");
    const storageKey = "hatake-no-kiroku-records";

    const today = new Date();
    const localToday = new Date(today.getTime() - today.getTimezoneOffset() * 60000)
      .toISOString()
      .slice(0, 10);
    dateInput.value = localToday;

    function loadRecords() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || [];
      } catch {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(storageKey, JSON.stringify(records));
    }

    function formatDate(value) {
      const [year, month, day] = value.split("-");
      return `${year}年${Number(month)}月${Number(day)}日`;
    }

    function renderRecords() {
      const records = loadRecords();
      recordList.innerHTML = "";
      empty.hidden = records.length > 0;

      records.forEach((record) => {
        const item = document.createElement("li");
        item.className = "record";

        const time = document.createElement("time");
        time.dateTime = record.date;
        time.textContent = formatDate(record.date);

        const text = document.createElement("p");
        text.textContent = record.memo;

        item.append(time, text);
        recordList.append(item);
      });
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const memo = memoInput.value.trim();

      if (!memo) {
        message.textContent = "メモを書いてから保存してください。";
        memoInput.focus();
        return;
      }

      const records = loadRecords();
      records.unshift({
        date: dateInput.value,
        memo,
        createdAt: new Date().toISOString()
      });
      saveRecords(records);

      memoInput.value = "";
      dateInput.value = localToday;
      message.textContent = "保存しました。";
      renderRecords();
    });

    clearButton.addEventListener("click", () => {
      memoInput.value = "";
      message.textContent = "";
      memoInput.focus();
    });

    renderRecords();
  </script>
</body>
</html>
